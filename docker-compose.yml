services:
  db:
    image: postgres:16-alpine
    container_name: mspr-healthai-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-healthai}
      POSTGRES_USER: ${DB_USER:-healthai_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-healthai_user} -d ${DB_NAME:-healthai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - mspr_data_network
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  mspr_data_network:
    driver: bridge
    name: mspr_data_network
